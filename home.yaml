mixed-port: 7890
allow-lan: true
mode: Rule
log-level: info
external-controller: :9090

# ----------------- 1. 单个普通 HTTP 节点 -----------------
proxies:
  - {name: "HOME", server: tardlk.com, port: 57890, type: http}

# ----------------- 2. 策略组配置 -----------------
proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - "yyty-http代理"
      - DIRECT

# ----------------- 3. 路由分流规则 -----------------
rules:
  # 局域网和本地流量直接连接
  - GEOIP,LAN,DIRECT
  # 其余所有流量全部走上面这个 HTTP 节点
  - MATCH,🚀 节点选择
